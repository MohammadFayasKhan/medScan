[theme]
base = "dark"
primaryColor = "#00d4ff"
backgroundColor = "#0a0f1e"
secondaryBackgroundColor = "#0f1829"
textColor = "#e2e8f0"
font = "sans serif"

[server]
headless = true
port = 8501
# enableCORS must be true when enableXsrfProtection is true (Streamlit default)
# Setting both correctly here prevents the CORS warning in logs
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false
